<div *ngIf="error" style="color:#b00020; margin-bottom:12px;">{{ error }}</div>
<div *ngIf="!error && movies.length === 0">No movies found.</div>

<div *ngFor="let m of movies" style="margin-bottom:12px;">
  <mat-card>
    <mat-card-title>{{ m.Title }}</mat-card-title>
    <mat-card-content>{{ m.Description }}</mat-card-content>
  </mat-card>
</div>
